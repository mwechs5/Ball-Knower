<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Knower</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:    #020e04;
  --card:  #051a08;
  --border:#1a6b2a;
  --glow:  #2ecc52;
  --gold:  #f0c040;
  --green: #2ecc52;
  --red:   #e53935;
  --text:  #e8f5e9;
  --muted: #6a9b72;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'Barlow',sans-serif; min-height:100vh; overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(10,60,20,0.5) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(180,140,0,0.08) 0%, transparent 50%);
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 8%,  rgba(255,255,255,0.3)  0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.2)  0%, transparent 100%),
    radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,0.3)  0%, transparent 100%),
    radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.2)  0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.25) 0%, transparent 100%);
}

/* HEADER */
header {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; border-bottom:1px solid rgba(26,107,42,0.6);
  background:rgba(2,10,3,0.95); backdrop-filter:blur(12px);
}
.logo-wrap { display:flex; align-items:center; gap:12px; }
.logo-icon {
  width:50px; height:50px; background:var(--card);
  border:2px solid var(--border); border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; box-shadow:0 0 14px rgba(46,204,82,0.25);
}
.logo-text { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:0.06em; color:var(--gold); line-height:1; text-shadow:0 0 24px rgba(201,162,39,0.5); }
.logo-sub  { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); display:block; }
.stat-pill { background:var(--card); border:1px solid rgba(26,107,42,0.6); border-radius:8px; padding:6px 14px; font-family:'Barlow Condensed',sans-serif; font-size:0.88rem; font-weight:600; color:var(--muted); letter-spacing:0.04em; }
.stat-pill b { color:var(--gold); }

/* MAIN */
main { position:relative; z-index:5; max-width:820px; margin:0 auto; padding:28px 20px 60px; }

/* LOADING */
#loading-screen { text-align:center; padding:80px 20px; }
.spinner { width:48px; height:48px; margin:24px auto 0; border:3px solid rgba(26,107,42,0.3); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin    { to { transform:rotate(360deg); } }
@keyframes fade-in { from{opacity:0} to{opacity:1} }

/* GAME */
#game-screen { display:none; }
.game-header { text-align:center; margin-bottom:24px; }
.game-title-badge svg { width:260px; filter:drop-shadow(0 0 18px rgba(201,162,39,0.7)); }

/* GRID */
.grid-wrap {
  background:var(--card); border:2px solid var(--border); border-radius:16px; padding:3px;
  box-shadow:0 0 0 1px rgba(46,204,82,0.15), 0 0 40px rgba(10,60,20,0.6), inset 0 0 40px rgba(0,0,0,0.5);
}
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; border-radius:14px; overflow:hidden; }

.square {
  aspect-ratio:1/1; background:linear-gradient(135deg,#051a08 0%,#0a2e10 100%);
  border:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:7px; transition:all 0.2s ease; position:relative; overflow:hidden; padding:12px; text-align:center;
}
.square::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(201,162,39,0.08) 0%,transparent 60%); opacity:0; transition:opacity 0.2s; }
.square:hover:not(.done-correct):not(.done-wrong):not(.sq-disabled)::before { opacity:1; }
.square:hover:not(.done-correct):not(.done-wrong):not(.sq-disabled) { background:linear-gradient(135deg,#0a2e10 0%,#0f4018 100%); box-shadow:inset 0 0 0 2px rgba(201,162,39,0.6), 0 0 24px rgba(46,204,82,0.2); transform:scale(0.97); }
.square:active:not(.done-correct):not(.done-wrong):not(.sq-disabled) { transform:scale(0.94); }
.square.done-correct { background:linear-gradient(135deg,#003320 0%,#004d2a 100%); box-shadow:inset 0 0 0 2px rgba(46,204,82,0.5); cursor:default; }
.square.done-wrong   { background:linear-gradient(135deg,#2a0a0a 0%,#3d1010 100%); box-shadow:inset 0 0 0 2px rgba(229,57,53,0.5); cursor:default; }
.square.sq-disabled  { cursor:default; opacity:0.4; }
.square:nth-child(4),.square:nth-child(5),.square:nth-child(6) { border-top:2px solid rgba(201,162,39,0.3); border-bottom:2px solid rgba(201,162,39,0.3); }
.sq-icon  { font-size:clamp(1.6rem,4.5vw,2.2rem); line-height:1; }
.sq-label { font-family:'Barlow Condensed',sans-serif; font-size:clamp(0.68rem,1.9vw,0.92rem); font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--text); line-height:1.2; }
.sq-sport { font-family:'Barlow Condensed',sans-serif; font-size:clamp(0.58rem,1.5vw,0.72rem); font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
.sq-check { font-size:1.6rem; display:none; position:absolute; bottom:10px; right:12px; }
.square.done-correct .sq-check { display:block; color:var(--green); }
.square.done-wrong   .sq-check { display:block; color:var(--red); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); backdrop-filter:blur(7px); z-index:200; display:none; align-items:flex-start; justify-content:center; padding:36px 16px; overflow-y:auto; }
.modal-overlay.open { display:flex; }
.modal { background:linear-gradient(160deg,#051a08 0%,#0a2e10 100%); border:2px solid var(--border); border-radius:16px; width:100%; max-width:560px; box-shadow:0 0 60px rgba(10,60,20,0.7), 0 0 0 1px rgba(201,162,39,0.2); animation:modal-in 0.26s cubic-bezier(0.22,1,0.36,1); overflow:visible; }
@keyframes modal-in { from{opacity:0;transform:translateY(-18px) scale(0.96)} to{opacity:1;transform:none} }
.modal-top { background:rgba(0,0,0,0.35); border-bottom:1px solid rgba(26,107,42,0.5); padding:10px 16px; display:flex; justify-content:flex-end; border-radius:14px 14px 0 0; }
.modal-close { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:6px; width:30px; height:30px; color:var(--muted); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.modal-close:hover { color:var(--text); background:rgba(255,255,255,0.12); }
.modal-body { padding:22px 22px 0; }

/* Photo */
.modal-photo { width:100%; height:260px; object-fit:cover; object-position:top center; border-radius:10px; margin-bottom:14px; display:none; }
.modal-photo.visible { display:block; }
.modal-photo.blurred { filter:blur(16px) brightness(0.6) grayscale(25%); transition:filter 0.55s ease; }
.modal-photo.clear   { filter:none; transition:filter 0.55s ease; }

/* Career path display */
.career-path {
  background:rgba(0,0,0,0.3); border:1px solid rgba(26,107,42,0.5);
  border-radius:10px; padding:18px 20px; margin-bottom:16px; display:none;
  font-family:'Barlow Condensed',sans-serif;
}
.career-path.visible { display:block; }
.career-path-label { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.career-path-teams { font-size:1.3rem; font-weight:700; color:var(--gold); line-height:1.5; letter-spacing:0.02em; }
.career-path-teams .arrow { color:var(--muted); margin:0 6px; font-size:1rem; }

.college-name { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.55rem; letter-spacing:0.05em; color:var(--gold); margin-bottom:6px; display:none; }
.college-name.visible { display:block; }
.modal-q-type { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.modal-question { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); line-height:1.35; margin-bottom:18px; }

/* Answer input + autocomplete */
.answer-input-wrap { position:relative; margin-bottom:12px; }
.answer-input {
  width:100%; background:rgba(0,0,0,0.35);
  border:2px solid rgba(26,107,42,0.6); border-radius:10px;
  padding:14px 60px 14px 16px;
  font-family:'Barlow Condensed',sans-serif; font-size:1.1rem;
  font-weight:600; color:var(--text); outline:none; transition:border-color 0.18s;
  position:relative; z-index:2;
}
.answer-input::placeholder { color:var(--muted); font-weight:400; }
.answer-input:focus { border-color:var(--gold); box-shadow:0 0 16px rgba(201,162,39,0.2); }
.answer-input:disabled { opacity:0.5; }
.submit-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:linear-gradient(90deg,#c9a227,#f0c040); border:none; border-radius:7px; padding:7px 14px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.08em; color:#020e04; cursor:pointer; transition:all 0.15s; font-weight:900; z-index:3; }
.submit-btn:hover { opacity:0.88; }
.submit-btn:disabled { opacity:0.3; cursor:default; }

/* Autocomplete dropdown — inline inside modal, no fixed positioning needed */
.autocomplete-list {
  display:none;
  background:#0a2e10;
  border:1px solid rgba(26,107,42,0.8);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}
.autocomplete-list.open { display:block; }
.autocomplete-item {
  padding:11px 16px;
  font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:600;
  color:var(--text); cursor:pointer; transition:background 0.12s;
  letter-spacing:0.02em; border-bottom:1px solid rgba(26,107,42,0.3);
}
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover, .autocomplete-item.active { background:rgba(201,162,39,0.15); color:var(--gold); }
.autocomplete-item mark { background:none; color:var(--gold); font-weight:800; }

/* Feedback */
.modal-feedback { display:none; padding:12px 14px; border-radius:8px; margin-bottom:14px; font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:600; gap:8px; align-items:flex-start; line-height:1.4; animation:fade-in 0.25s ease; }
.modal-feedback.show { display:flex; }
.modal-feedback.correct { background:rgba(46,204,82,0.1); border:1px solid rgba(46,204,82,0.35); color:var(--green); }
.modal-feedback.wrong   { background:rgba(229,57,53,0.08); border:1px solid rgba(229,57,53,0.35); color:var(--red); }
.modal-feedback .fb-ans { color:var(--gold); font-weight:700; }

.continue-btn { display:none; width:100%; padding:14px; margin-bottom:22px; background:linear-gradient(90deg,#1a6b2a,#2ecc52); border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:1.25rem; letter-spacing:0.12em; color:#fff; cursor:pointer; transition:all 0.17s; animation:fade-in 0.25s ease; }
.continue-btn:hover { opacity:0.88; transform:translateY(-2px); }
.continue-btn.show { display:block; }

/* RESULTS */
#results-screen { display:none; text-align:center; padding-top:36px; animation:fade-in 0.4s ease; }
.res-trophy { font-size:4rem; margin-bottom:10px; filter:drop-shadow(0 0 22px rgba(240,192,64,0.6)); }
.res-title  { font-family:'Bebas Neue',sans-serif; font-size:2.7rem; color:var(--gold); margin-bottom:4px; text-shadow:0 0 30px rgba(201,162,39,0.4); }
.res-sub    { font-family:'Barlow Condensed',sans-serif; font-size:0.88rem; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:20px; }
.res-score  { font-family:'Bebas Neue',sans-serif; font-size:5rem; line-height:1; color:var(--text); margin-bottom:4px; }
.res-score span { color:var(--gold); }
.res-lbl    { font-family:'Barlow Condensed',sans-serif; font-size:0.8rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:22px; }
.res-stats  { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:22px; }
.res-stat   { background:var(--card); border:1px solid rgba(26,107,42,0.5); border-radius:10px; padding:14px 20px; min-width:100px; }
.res-stat b { display:block; font-family:'Bebas Neue',sans-serif; font-size:1.9rem; color:var(--text); }
.res-stat small { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.res-msg    { font-family:'Barlow Condensed',sans-serif; font-size:0.93rem; color:var(--muted); background:var(--card); border:1px solid rgba(26,107,42,0.4); border-radius:10px; padding:12px 20px; max-width:320px; margin:0 auto; }

@media(max-width:540px){
  header { padding:10px 12px; }
  .logo-text { font-size:1.35rem; }
  main { padding:16px 10px 40px; }
  .modal-photo { height:180px; }
  .career-path-teams { font-size:1.05rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon" style="padding:0;overflow:hidden;">
      <img src="https://i.imgur.com/0NEyuj2.png" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">
    </div>
    <div>
      <div class="logo-text">Ball Knower</div>
      <span class="logo-sub">Daily Chance to Prove Your Ball Knowledge</span>
    </div>
  </div>
  <div class="stat-pill">Score: <b id="score-display">0</b> / <span id="total-display">9</span></div>
</header>

<main>
  <div id="loading-screen">
    <div style="font-size:3rem;margin-bottom:16px;">🏆</div>
    <div id="loading-msg" style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;color:var(--muted);letter-spacing:0.08em;">Loading today's questions...</div>
    <div class="spinner"></div>
  </div>

  <div id="game-screen">
    <div class="game-header">
      <div class="game-title-badge">
        <svg viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#1a6b2a"/>
              <stop offset="100%" style="stop-color:#c9a227"/>
            </linearGradient>
          </defs>
          <polygon points="0,8 286,8 316,36 286,64 0,64" fill="url(#g1)" opacity="0.92"/>
          <polygon points="2,10 284,10 312,36 284,62 2,62" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
          <text x="142" y="28" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="15" fill="white" letter-spacing="4" opacity="0.85">BALL KNOWER</text>
          <text x="142" y="52" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="20" font-weight="800" fill="white" letter-spacing="1">DAILY CHALLENGE</text>
        </svg>
      </div>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="question-grid"></div>
    </div>
    <div id="results-screen">
      <div class="res-trophy" id="res-trophy">🏆</div>
      <div class="res-title"  id="res-title">Ball Knower!</div>
      <div class="res-sub">All squares complete</div>
      <div class="res-score"><span id="res-score">0</span>/<span id="res-total">9</span></div>
      <div class="res-lbl">Correct</div>
      <div class="res-stats">
        <div class="res-stat"><b id="res-correct">0</b><small>Correct</small></div>
        <div class="res-stat"><b id="res-wrong">0</b><small>Wrong</small></div>
      </div>
      <div class="res-msg" id="res-msg">🔁 New questions tomorrow!</div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="backdropClose(event)">
  <div class="modal">
    <div class="modal-top">
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <img class="modal-photo" id="modal-photo" src="" alt="Athlete">
      <div class="career-path" id="career-path">
        <div class="career-path-label">📍 Career Path — Who is this player?</div>
        <div class="career-path-teams" id="career-path-teams"></div>
      </div>
      <div class="college-name" id="college-name"></div>
      <div class="modal-q-type" id="modal-q-type"></div>
      <div class="modal-question" id="modal-question"></div>
      <div class="answer-input-wrap">
        <input class="answer-input" id="answer-input" type="text"
               placeholder="Guess an answer..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">GO</button>
      </div>
      <div class="autocomplete-list" id="autocomplete-list"></div>
      <div class="modal-feedback" id="modal-feedback"></div>
      <button class="continue-btn" id="continue-btn" onclick="closeModal()">Close ✕</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  GOOGLE SHEET CSV URL
// ══════════════════════════════════════════════════════════
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuFiJkyJOYqTv1xSpgrGR2NlGmwI_hoehb302WdO9-9Qo-Sshzp7jE-0Ej9mFqkmrgYs2o6K-yQlsd/pub?output=csv';

// ══════════════════════════════════════════════════════════
//  AUTOCOMPLETE LISTS — loaded from Google Sheet Players tab
// ══════════════════════════════════════════════════════════
const PLAYERS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9OvanCtqofoj6PebP4MoxXbEWKYqTS4QZV8690OK99DIEvcTBXQmL5wBI_aSc0391ZdyLZTbXHGfU/pub?output=csv';

let MLB_PLAYERS  = [];
let NBA_PLAYERS  = [];
let NFL_PLAYERS  = [];
let COLLEGES     = [];

async function loadPlayerList() {
  try {
    const res = await fetch(PLAYERS_SHEET_URL);
    if (!res.ok) throw new Error('Players tab not found');
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1); // skip header
    for (const line of lines) {
      const cols = csvRow(line);
      const name = (cols[0] || '').trim();
      const type = (cols[1] || '').trim().toUpperCase();
      if (!name) continue;
      if (type === 'MLB')     MLB_PLAYERS.push(name);
      else if (type === 'NBA')     NBA_PLAYERS.push(name);
      else if (type === 'NFL')     NFL_PLAYERS.push(name);
      else if (type === 'COLLEGE') COLLEGES.push(name);
    }
  } catch(e) {
    console.warn('Could not load players tab, autocomplete disabled:', e.message);
  }
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let questions = [];
let answered  = {};
let score     = 0;
let activeIdx = null;
let qAnswered = false;
let acIndex   = -1; // autocomplete keyboard nav index

const ICONS = { MLB:'⚾', NBA:'🏀', NFL:'🏈', '':'🏆' };

// ══════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  await loadPlayerList(); // load autocomplete lists first
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    parseCSV(await res.text());
  } catch(e) {
    document.getElementById('loading-msg').innerHTML =
      `<span style="color:#e53935">Could not load questions.<br>Make sure the sheet is published (File → Share → Publish to web → CSV).<br><br>Error: ${e.message}</span>`;
    document.querySelector('.spinner').style.display = 'none';
  }
});

// ══════════════════════════════════════════════════════════
//  CSV PARSER
// ══════════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const qs = [];
  for (const line of lines) {
    const cols = csvRow(line);
    const sq = parseInt(cols[0]);
    if (!sq || sq < 1 || sq > 9) continue;
    if (!cols[1] && !cols[3]) continue; // skip fully empty rows

    // Columns: A=square, B=category, C=image_url, D=question, E=answer, F=also_accept, G=player_name
    const cat      = (cols[1] || '').trim();
    const imgUrl   = (cols[2] || '').trim();
    const question = (cols[3] || '').trim();
    const answer   = (cols[4] || '').trim();
    const alts     = (cols[5] || '').trim();
    const colName  = (cols[6] || '').trim();

    const accepted = [answer, ...alts.split(',')]
      .map(a => normalize(a)).filter(Boolean);

    const catLower = cat.toLowerCase();
    let roundType = 'identify';
    if (catLower.includes('college')) roundType = 'college';
    if (catLower.includes('career'))  roundType = 'career';

    // Extra safety: if question contains -> it's always a career path
    if (question.includes('->')) roundType = 'career';

    qs.push({
      index: sq - 1, category: cat, img: imgUrl,
      question, accepted, displayAnswer: answer, collegeName: colName,
      roundType,
      sport: /MLB/i.test(cat) ? 'MLB' : /NBA/i.test(cat) ? 'NBA' : /NFL/i.test(cat) ? 'NFL' : '',
    });
  }

  if (!qs.length) {
    document.getElementById('loading-msg').innerHTML =
      '<span style="color:#e53935">No questions found. Make sure column A has numbers 1–9.</span>';
    document.querySelector('.spinner').style.display = 'none';
    return;
  }

  qs.sort((a,b) => a.index - b.index);
  questions = Array.from({length:9}, (_,i) => qs.find(q => q.index === i) || null);
  answered = {}; score = 0; activeIdx = null; qAnswered = false;

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('game-screen').style.display    = 'block';
  document.getElementById('results-screen').style.display = 'none';
  buildGrid();
  syncHeader();
}

function csvRow(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

// ══════════════════════════════════════════════════════════
//  IMAGE URL CONVERSION
// ══════════════════════════════════════════════════════════
function toImgSrc(url) {
  if (!url) return '';
  url = url.trim();
  const drv = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?.*?id=)([a-zA-Z0-9_-]{10,})/);
  if (drv) return `https://drive.google.com/uc?export=view&id=${drv[1]}`;
  if (url.includes('dropbox.com')) return url.replace(/[?&]dl=\d/,'').replace(/[?&]raw=\d/,'') + (url.includes('?')? '&':'?') + 'raw=1';
  return url;
}

// ══════════════════════════════════════════════════════════
//  GRID
// ══════════════════════════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('question-grid');
  grid.innerHTML = '';
  const total = questions.filter(Boolean).length;
  document.getElementById('total-display').textContent = total;
  document.getElementById('res-total').textContent = total;

  questions.forEach((q, i) => {
    const sq = document.createElement('button');
    sq.id = `sq-${i}`; sq.className = 'square';
    if (!q) {
      sq.classList.add('sq-disabled');
      sq.innerHTML = '<span style="color:var(--muted);font-size:1.8rem">?</span>';
    } else {
      const label = q.roundType === 'college' ? 'Name College'
                  : q.roundType === 'career'  ? 'Career Path'
                  : 'Identify Player';
      sq.innerHTML = `
        <div class="sq-icon">${ICONS[q.sport] || '🏆'}</div>
        <div class="sq-label">${label}</div>
        <div class="sq-sport">${q.sport}</div>
        <div class="sq-check"></div>`;
      sq.onclick = () => openQ(i);
    }
    grid.appendChild(sq);
  });
}

function syncHeader() {
  document.getElementById('score-display').textContent = score;
}

// ══════════════════════════════════════════════════════════
//  MODAL OPEN
// ══════════════════════════════════════════════════════════
function openQ(i) {
  if (answered.hasOwnProperty(i)) return;
  const q = questions[i]; if (!q) return;
  activeIdx = i; qAnswered = false; acIndex = -1;

  // Photo
  const photoEl = document.getElementById('modal-photo');
  const src = toImgSrc(q.img);
  if (src && q.roundType !== 'career') {
    photoEl.src = src;
    photoEl.className = 'modal-photo visible' + (q.roundType === 'college' ? ' blurred' : '');
    photoEl.style.display = '';
    photoEl.onerror = () => { photoEl.style.display = 'none'; };
  } else {
    photoEl.className = 'modal-photo'; photoEl.style.display = 'none';
  }

  // Career path
  const cpEl = document.getElementById('career-path');
  const cpTeams = document.getElementById('career-path-teams');
  if (q.roundType === 'career' && q.question) {
    // Format: "2008 NYM -> WSN -> CHI -> COL" — split on -> and style
    const parts = q.question.split('->').map(s => s.trim());
    cpTeams.innerHTML = parts.map((p, idx) =>
      idx < parts.length - 1
        ? `${p}<span class="arrow">→</span>`
        : `${p}`
    ).join('');
    cpEl.className = 'career-path visible';
  } else {
    cpEl.className = 'career-path';
  }

  // College name
  const nameEl = document.getElementById('college-name');
  if (q.roundType === 'college' && q.collegeName) {
    nameEl.textContent = q.collegeName; nameEl.className = 'college-name visible';
  } else { nameEl.className = 'college-name'; }

  // Q type label
  const typeLabel = q.roundType === 'college' ? '🎓 Where did they go to college?'
                  : q.roundType === 'career'  ? '👤 Who is this player?'
                  : '📸 Who is this?';
  document.getElementById('modal-q-type').textContent = typeLabel;
  document.getElementById('modal-question').textContent = q.roundType === 'career' ? '' : q.question;

  // Input reset
  const inp = document.getElementById('answer-input');
  inp.value = ''; inp.disabled = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('modal-feedback').className = 'modal-feedback';
  document.getElementById('continue-btn').classList.remove('show');
  closeAC();

  // Wire autocomplete
  inp.oninput = () => showAC(inp.value, q);
  inp.onkeydown = (e) => handleACKey(e, q);

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => inp.focus(), 100);
}

// ══════════════════════════════════════════════════════════
//  AUTOCOMPLETE
// ══════════════════════════════════════════════════════════
function getList(q) {
  if (q.roundType === 'college') return COLLEGES;
  if (q.sport === 'MLB') return MLB_PLAYERS;
  if (q.sport === 'NBA') return NBA_PLAYERS;
  if (q.sport === 'NFL') return NFL_PLAYERS;
  return [...MLB_PLAYERS, ...NBA_PLAYERS, ...NFL_PLAYERS];
}

function showAC(val, q) {
  const list = document.getElementById('autocomplete-list');
  const term = val.trim().toLowerCase();
  if (term.length < 1) { closeAC(); return; }

  const matches = getList(q)
    .filter(n => n.toLowerCase().includes(term))
    .slice(0, 6);

  if (!matches.length) { closeAC(); return; }

  list.innerHTML = matches.map((name, idx) => {
    const hi = name.replace(new RegExp(`(${escRe(term)})`, 'gi'), '<mark>$1</mark>');
    return `<div class="autocomplete-item" data-idx="${idx}" onmousedown="pickAC('${escAttr(name)}')">${hi}</div>`;
  }).join('');

  list.className = 'autocomplete-list open';
  acIndex = -1;
}

function closeAC() {
  document.getElementById('autocomplete-list').className = 'autocomplete-list';
  acIndex = -1;
}

function pickAC(name) {
  document.getElementById('answer-input').value = name;
  closeAC();
  submitAnswer();
}

function handleACKey(e, q) {
  const list = document.getElementById('autocomplete-list');
  const items = list.querySelectorAll('.autocomplete-item');

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el,i) => el.classList.toggle('active', i === acIndex));
    if (items[acIndex]) document.getElementById('answer-input').value = items[acIndex].textContent;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, -1);
    items.forEach((el,i) => el.classList.toggle('active', i === acIndex));
  } else if (e.key === 'Escape') {
    closeAC();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIndex >= 0 && items[acIndex]) {
      document.getElementById('answer-input').value = items[acIndex].textContent;
      closeAC();
    }
    submitAnswer();
  }
}

function escRe(s)   { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function escAttr(s) { return s.replace(/'/g,"\\'"); }

// ══════════════════════════════════════════════════════════
//  ANSWER
// ══════════════════════════════════════════════════════════
function submitAnswer() {
  if (qAnswered) return;
  closeAC();
  const inp   = document.getElementById('answer-input');
  const guess = inp.value.trim();
  if (!guess) { inp.focus(); return; }

  qAnswered = true;
  inp.disabled = true;
  document.getElementById('submit-btn').disabled = true;

  const q = questions[activeIdx];
  const isCorrect = q.accepted.some(a => a === normalize(guess));

  const fb = document.getElementById('modal-feedback');
  if (isCorrect) {
    score++; syncHeader();
    const msgs = ['🔥 Nailed it!','✅ Correct!','🎯 Ball Knower!','💪 Let\'s go!','👑 That\'s a W!'];
    fb.className = 'modal-feedback show correct';
    fb.innerHTML = `<span>✅</span><span>${msgs[Math.floor(Math.random()*msgs.length)]}</span>`;
  } else {
    fb.className = 'modal-feedback show wrong';
    fb.innerHTML = `<span>❌</span><span>Not quite — the answer was <span class="fb-ans">${q.displayAnswer}</span></span>`;
  }

  // Unblur photo
  const photo = document.getElementById('modal-photo');
  photo.classList.remove('blurred'); photo.classList.add('clear');

  answered[activeIdx] = isCorrect;
  const sq = document.getElementById(`sq-${activeIdx}`);
  if (sq) {
    sq.classList.add(isCorrect ? 'done-correct' : 'done-wrong');
    sq.querySelector('.sq-check').textContent = isCorrect ? '✓' : '✗';
    sq.onclick = null;
  }
  document.getElementById('continue-btn').classList.add('show');
}

function normalize(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}

// ══════════════════════════════════════════════════════════
//  CLOSE / RESULTS
// ══════════════════════════════════════════════════════════
function closeModal() {
  closeAC();
  document.getElementById('modal-overlay').classList.remove('open');
  activeIdx = null;
  const total = questions.filter(Boolean).length;
  if (Object.keys(answered).length >= total) showResults();
}

function backdropClose(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function showResults() {
  const total = questions.filter(Boolean).length;
  document.getElementById('res-score').textContent   = score;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent   = total - score;
  document.getElementById('res-total').textContent   = total;

  let trophy='🏆', title='Ball Knower!', msg='🔁 New questions tomorrow!';
  if      (score===0)        {trophy='😬';title='Absolutely 0 Ball Knowledge';      msg='Hit the film room. Come back tomorrow.';}
  else if (score<=2)         {trophy='📚';title='You are an Amatuer Ball Knower'; msg='Ball Knowledge doesn't happen over night, back to work.';}
  else if (score<=5)         {trophy='💪';title='You're halfway to a true Ball Knower';    msg='Lock in tomorrow.';}
  else if (score===total-1)  {trophy='🎯';title='Certified Ball Knower';         msg='Almost a Prime Ball Knower.';}
  else if (score===total)    {trophy='🐐';title='Certified Ball Knower.';   msg='🔥 Perfect score, you watch ball.';}

  document.getElementById('res-trophy').textContent = trophy;
  document.getElementById('res-title').textContent  = title;
  document.getElementById('res-msg').textContent    = msg;
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('results-screen').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
